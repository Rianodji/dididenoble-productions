<div class="min-h-screen bg-white font-sans text-gray-900 scroll-smooth selection:bg-[#C5A059] selection:text-white overflow-x-hidden">
  
  <!-- NAVBAR -->
  <app-navbar 
    [menuOpen]="isMenuOpen()" 
    [isScrolled]="isScrolled()" 
    (toggleMenu)="toggleMenu()"
  ></app-navbar>

  <!-- OVERLAY MENU MOBILE (La pièce manquante pour Android/iPhone) -->
  <div 
    class="fixed inset-0 z-[100] bg-black/95 backdrop-blur-lg transition-all duration-500 lg:hidden flex flex-col items-center justify-center gap-10"
    [class.opacity-0]="!isMenuOpen()"
    [class.pointer-events-none]="!isMenuOpen()"
    [class.opacity-100]="isMenuOpen()"
  >
    <!-- Bouton de fermeture rapide pour iPhone -->
    <button (click)="toggleMenu()" class="absolute top-8 right-8 text-[#C5A059]">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <nav class="flex flex-col items-center gap-8 font-black uppercase text-2xl tracking-tighter text-white">
      <a (click)="toggleMenu()" href="#accueil" class="hover:text-[#C5A059] transition-colors">Accueil</a>
      <a (click)="toggleMenu()" href="#agence" class="hover:text-[#C5A059] transition-colors">L'Agence</a>
      <a (click)="toggleMenu()" href="#equipe" class="hover:text-[#C5A059] transition-colors">L'Équipe</a>
      <a (click)="toggleMenu()" href="#projets" class="hover:text-[#C5A059] transition-colors">Projets</a>
      <a (click)="toggleMenu()" href="#actualites" class="hover:text-[#C5A059] transition-colors">Actualités</a>
    </nav>
    
    <button (click)="toggleMenu()" class="px-10 py-4 bg-[#C5A059] text-black font-black uppercase text-[10px] tracking-widest">
      Contact
    </button>
  </div>

  <!-- MAIN CONTENT -->
  <main [class.blur-md]="isMenuOpen()" class="transition-all duration-500">
    <app-hero></app-hero>
    <app-services></app-services>
    <app-equipe></app-equipe>
    <app-project></app-project>
    
    <!-- SECTION NEWS (Optimisée Mobile) -->
    <section id="actualites" class="py-20 md:py-32 bg-gray-50">
      <div class="max-w-7xl mx-auto px-6">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 md:mb-20 border-b border-gray-200 pb-12">
          <div class="mb-4 md:mb-0">
            <h2 class="text-[#C5A059] font-bold uppercase tracking-[0.4em] text-[8px] md:text-[10px] mb-4">Newsroom</h2>
            <h3 class="text-3xl md:text-5xl font-black uppercase tracking-tighter leading-none">Journal de Bord</h3>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 md:gap-20">
          <!-- Article 1 -->
          <article class="group cursor-pointer space-y-6 md:space-y-8">
            <div class="aspect-video bg-gray-200 overflow-hidden relative border border-gray-100 shadow-sm rounded-sm">
              <img src="/ndomich-cover.jpeg" alt="BEWA Cover" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
              <div class="absolute inset-0 bg-black/20 group-hover:bg-black/0 transition-all duration-700"></div>
              <div class="absolute top-4 left-4 md:top-6 md:left-6 bg-white px-3 py-1 text-[8px] md:text-[9px] font-black uppercase tracking-widest text-gray-900 z-10">
                Impact Social
              </div>
            </div>
            <div class="space-y-2 md:space-y-4">
              <span class="text-[#C5A059] text-[9px] md:text-[10px] font-black uppercase tracking-widest">15 Mai 2026</span>
              <h4 class="text-2xl md:text-3xl font-black uppercase leading-tight group-hover:text-[#C5A059] transition-colors">
                Médiation culturelle : Le Rap comme outil de paix.
              </h4>
            </div>
          </article>

          <!-- Article 2 -->
          <article class="group cursor-pointer space-y-6 md:space-y-8">
            <div class="aspect-video bg-gray-200 overflow-hidden relative border border-gray-100 shadow-sm rounded-sm">
              <img src="/ndomich-portrait.jpeg" alt="Ndomich KGB" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
              <div class="absolute inset-0 bg-black/20 group-hover:bg-black/0 transition-all duration-700"></div>
              <div class="absolute top-4 left-4 md:top-6 md:left-6 bg-white px-3 py-1 text-[8px] md:text-[9px] font-black uppercase tracking-widest text-gray-900 z-10">
                Studio
              </div>
            </div>
            <div class="space-y-2 md:space-y-4">
              <span class="text-[#C5A059] text-[9px] md:text-[10px] font-black uppercase tracking-widest">10 Mai 2026</span>
              <h4 class="text-2xl md:text-3xl font-black uppercase leading-tight group-hover:text-[#C5A059] transition-colors">
                Post-production lancée pour l'EP de Ndomich KGB.
              </h4>
            </div>
          </article>
        </div>
      </div>
    </section>
  </main>

  <app-footer></app-footer>
</div>
